<div class="empty-state">
  <mat-icon class="empty-icon">{{ icon }}</mat-icon>
  <h3>{{ title }}</h3>
  <p *ngIf="message">{{ message }}</p>
  <button mat-raised-button 
          color="primary" 
          *ngIf="actionText"
          (click)="action.emit()">
    <mat-icon *ngIf="actionIcon">{{ actionIcon }}</mat-icon>
    {{ actionText }}
  </button>
</div>
