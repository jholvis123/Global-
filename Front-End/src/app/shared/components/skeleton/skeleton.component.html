<ng-container [ngSwitch]="type">
  <!-- Text skeleton -->
  <ng-container *ngSwitchCase="'text'">
    <div class="skeleton skeleton-text" 
         *ngFor="let item of items"
         [class.animated]="animated"
         [style.width]="width"
         [style.height]="height || '14px'">
    </div>
  </ng-container>

  <!-- Title skeleton -->
  <ng-container *ngSwitchCase="'title'">
    <div class="skeleton skeleton-title" 
         *ngFor="let item of items"
         [class.animated]="animated"
         [style.width]="width"
         [style.height]="height || '24px'">
    </div>
  </ng-container>

  <!-- Avatar skeleton -->
  <ng-container *ngSwitchCase="'avatar'">
    <div class="skeleton skeleton-avatar" 
         *ngFor="let item of items"
         [class.animated]="animated"
         [style.width]="width || '40px'"
         [style.height]="height || '40px'">
    </div>
  </ng-container>

  <!-- Thumbnail skeleton -->
  <ng-container *ngSwitchCase="'thumbnail'">
    <div class="skeleton skeleton-thumbnail" 
         *ngFor="let item of items"
         [class.animated]="animated"
         [style.width]="width || '120px'"
         [style.height]="height || '80px'">
    </div>
  </ng-container>

  <!-- Card skeleton -->
  <ng-container *ngSwitchCase="'card'">
    <div class="skeleton-card" *ngFor="let item of items">
      <div class="skeleton skeleton-card__header animated"></div>
      <div class="skeleton-card__body">
        <div class="skeleton skeleton-text animated" style="width: 80%"></div>
        <div class="skeleton skeleton-text animated" style="width: 60%"></div>
        <div class="skeleton skeleton-text animated" style="width: 40%"></div>
      </div>
    </div>
  </ng-container>

  <!-- Table row skeleton -->
  <ng-container *ngSwitchCase="'table-row'">
    <div class="skeleton-table-row" *ngFor="let item of items">
      <div class="skeleton skeleton-cell animated" style="width: 40px; height: 40px; border-radius: 50%;"></div>
      <div class="skeleton skeleton-cell animated" style="flex: 2"></div>
      <div class="skeleton skeleton-cell animated" style="flex: 1"></div>
      <div class="skeleton skeleton-cell animated" style="flex: 1"></div>
      <div class="skeleton skeleton-cell animated" style="width: 100px"></div>
    </div>
  </ng-container>

  <!-- Stat card skeleton -->
  <ng-container *ngSwitchCase="'stat-card'">
    <div class="skeleton-stat-card" *ngFor="let item of items">
      <div class="skeleton-stat-card__icon skeleton animated"></div>
      <div class="skeleton-stat-card__content">
        <div class="skeleton skeleton-text animated" style="width: 60%"></div>
        <div class="skeleton skeleton-title animated" style="width: 80%"></div>
      </div>
    </div>
  </ng-container>
</ng-container>
